name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least-privilege token: read the repo, write the Pages deployment via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One run per ref; let a newer push supersede an in-flight one.
concurrency:
  group: ci-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Quality gate — runs on every push and PR. Deploy depends on it, so a red
  # gate blocks the release. Mirrors the local definition of green: Biome clean,
  # unit tests pass, and a full stable Playwright pass (built + previewed).
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run lint:prose
      - run: bun run test
      - run: bunx playwright install --with-deps chromium
      - run: bun run test:e2e

  build:
    needs: verify
    # Only produce the Pages artifact for the live branch, not for PRs.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
